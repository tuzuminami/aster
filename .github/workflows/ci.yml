name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aster
          POSTGRES_USER: aster
          POSTGRES_PASSWORD: aster_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aster -d aster"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Private boundary check
        run: pnpm run check:private-boundary

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Migrate PostgreSQL
        run: pnpm run db:migrate
        env:
          DATABASE_URL: postgres://aster:aster_dev_password@127.0.0.1:5432/aster

      - name: PostgreSQL integration test
        run: pnpm run test:postgres
        env:
          TEST_DATABASE_URL: postgres://aster:aster_dev_password@127.0.0.1:5432/aster

      - name: Package dry-run
        run: pnpm pack --dry-run
