services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aster
      POSTGRES_USER: aster
      POSTGRES_PASSWORD: aster_dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aster -d aster"]
      interval: 5s
      timeout: 3s
      retries: 10
