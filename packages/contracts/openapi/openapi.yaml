openapi: 3.1.0
info:
  title: ASTER API
  version: 0.2.0
paths:
  /health:
    get:
      responses:
        "200":
          description: Service health.
  /v1/personas:
    post:
      summary: Create a persona draft container.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Persona created.
  /v1/personas/{personaId}/versions:
    post:
      summary: Create a draft persona version from a Persona Contract.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: personaId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contract]
              properties:
                contract:
                  $ref: "../schemas/persona-contract.schema.json"
      responses:
        "201":
          description: Draft version created.
  /v1/personas/{personaId}/versions/{version}/publish:
    post:
      summary: Publish an immutable persona version.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: personaId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Version published.
  /v1/personas/{personaId}/versions/{version}/compile:
    post:
      summary: Compile a published persona version into a deterministic bundle.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: personaId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Compiled bundle.
  /v1/personas/{personaId}/versions/{version}/diff/{otherVersion}:
    get:
      summary: Diff two persona versions.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - name: personaId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
        - name: otherVersion
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Version diff.
  /v1/plugins/validate:
    post:
      summary: Validate and register a plugin manifest for this process.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Plugin accepted.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
