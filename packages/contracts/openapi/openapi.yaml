openapi: 3.1.0
info:
  title: ASTER API
  version: 2.0.0
paths:
  /health:
    get:
      responses:
        "200":
          description: Service health.
  /v1/personas:
    post:
      summary: Create a persona draft container.
      parameters:
        - $ref: "#/components/parameters/TenantAssertion"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Persona created.
        "409":
          description: Idempotency key was reused for a different request.
  /v1/personas/{personaId}/versions:
    post:
      summary: Create a draft persona version from a Persona Contract.
      parameters:
        - $ref: "#/components/parameters/TenantAssertion"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: personaId
          in: path
          required: true
          schema:
            type: string
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contract]
              properties:
                contract:
                  $ref: "../schemas/persona-contract.schema.json"
      responses:
        "201":
          description: Draft version created.
        "409":
          description: Idempotency key was reused for a different request.
  /v1/personas/{personaId}/versions/{version}/publish:
    post:
      summary: Publish an immutable persona version.
      parameters:
        - $ref: "#/components/parameters/TenantAssertion"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: personaId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Version published.
        "409":
          description: Idempotency key was reused for a different request.
  /v1/personas/{personaId}/versions/{version}/compile:
    post:
      summary: Compile a published persona version into a deterministic bundle.
      parameters:
        - $ref: "#/components/parameters/TenantAssertion"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - name: personaId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Compiled bundle.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/CompiledBundle"
        "409":
          description: Idempotency key was reused for a different request.
  /v1/personas/{personaId}/versions/{version}/diff/{otherVersion}:
    get:
      summary: Diff two persona versions.
      parameters:
        - $ref: "#/components/parameters/TenantAssertion"
        - $ref: "#/components/parameters/CorrelationId"
        - name: personaId
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
        - name: otherVersion
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Version diff.
  /v1/plugins/validate:
    post:
      summary: Validate and register a plugin manifest for this process.
      parameters:
        - $ref: "#/components/parameters/TenantAssertion"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginManifest"
      responses:
        "200":
          description: Plugin accepted.
        "409":
          description: Idempotency key was reused for a different request.
        "401":
          $ref: "#/components/responses/AuthenticationRequired"
        "403":
          $ref: "#/components/responses/AuthorizationDenied"
        "422":
          $ref: "#/components/responses/ValidationFailed"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    TenantAssertion:
      name: X-Tenant-Id
      in: header
      required: false
      description: Optional caller assertion. The authenticated principal owns tenant identity; a supplied value must match it.
      schema:
        type: string
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
  schemas:
    CompiledBundle:
      $ref: "../schemas/compiled-bundle.schema.json"
    PluginManifest:
      type: object
      required: [name, version, capabilities, coreApiVersion, enabled]
      properties:
        name:
          type: string
          minLength: 1
        version:
          type: string
          minLength: 1
        capabilities:
          type: array
          items:
            type: string
            enum: [context_injector, renderer]
        coreApiVersion:
          type: string
          const: v1
        enabled:
          type: boolean
  responses:
    AuthenticationRequired:
      description: The bearer token was absent or could not be verified.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    AuthorizationDenied:
      description: The authenticated principal lacks the required scope or asserted a different tenant.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationFailed:
      description: The request body does not satisfy the endpoint contract.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: string
